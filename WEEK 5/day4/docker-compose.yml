services:

  backend1:
    build: ./backend
    container_name: backend1

  backend2:
    build: ./backend
    container_name: backend2

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "4005:4005"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/certs:/etc/nginx/certs
    depends_on:
      - backend1
      - backend2